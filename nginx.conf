worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;
events { worker_connections 1024; use epoll; multi_accept on; }
http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;
  log_format main '$remote_addr - $remote_user [$time_local] "$request" $status $body_bytes_sent "$http_referer" "$http_user_agent"';
  access_log /var/log/nginx/access.log main;
  sendfile on; tcp_nopush on; tcp_nodelay on; keepalive_timeout 65; server_tokens off;
  gzip on; gzip_vary on; gzip_proxied any; gzip_comp_level 6; gzip_min_length 256;
  gzip_types text/plain text/css text/javascript application/javascript application/json image/svg+xml font/woff font/woff2;
  server {
    listen 80; server_name _; root /usr/share/nginx/html; index index.html;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ { expires 1y; add_header Cache-Control "public, immutable"; access_log off; }
    location /health { access_log off; return 200 '{"status":"ok","service":"betterroads"}'; add_header Content-Type application/json; }
    location / { try_files $uri $uri/ /index.html; }
    location ~ /\. { deny all; access_log off; log_not_found off; }
  }
}
